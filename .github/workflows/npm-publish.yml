name: Publish Design System

# Publishes @aegis-initiative/design-system to npm when a
# `design-system-v*` tag is pushed.
#
# Authentication: OIDC trusted publishing. No npm token required.
# The `id-token: write` permission lets GitHub Actions mint a
# short-lived OIDC token which `npm publish --provenance` exchanges
# for a scoped publish token at registry.npmjs.org. Provenance
# attestations are signed with the repo identity and show up on the
# package page.
#
# Prerequisites (one-time setup on npmjs.com):
#
#   1. Log into npmjs.com as an owner of @aegis-initiative/design-system
#   2. Package page → Settings → Publishing Access → Trusted Publisher
#   3. Add a GitHub Actions trusted publisher with:
#        Organization:   aegis-initiative
#        Repository:     aegis-initiative
#        Workflow:       .github/workflows/npm-publish.yml
#        Environment:    npm-publish
#
# If that configuration isn't in place, `npm publish` will fall
# through to token auth, fail with ENEEDAUTH, and the workflow run
# will error out.

on:
  push:
    tags:
      - 'design-system-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # npm OIDC trusted publishing requires npm CLI v11.5.0+.
      # Node 22 LTS ships with npm 10.9.x, which only supports
      # `--provenance` for Sigstore attestation — it does not know
      # how to exchange an OIDC token for a scoped publish token
      # at registry.npmjs.org. Upgrading to the latest npm CLI
      # unlocks the full trusted publishing path.
      - run: npm install -g npm@latest
      # No `registry-url` on setup-node: that action writes an .npmrc
      # template with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`,
      # and the presence of an auth line — even an empty one — makes
      # npm CLI take the token-auth path instead of OIDC. Without
      # an .npmrc at all, npm falls through to the OIDC path
      # cleanly.
      - run: npm publish --access public --provenance
        working-directory: packages/aegis-design-system
